<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALA LIVE - 后台管理系统</title>
        <link rel="stylesheet" href="css/index.css">

</head>
<body>
<div class="login-container">
    <!-- Left Decorative -->
    <div class="login-left">
        <div class="brand-big">GALA LIVE</div>
        <div class="sub-big">直播运营管理平台</div>
        <div class="features">
            <div class="feature">
                <span class="feat-icon">📊</span>
                <span>实时数据监控与分析</span>
            </div>
            <div class="feature">
                <span class="feat-icon">👥</span>
                <span>主播管理与审核</span>
            </div>
            <div class="feature">
                <span class="feat-icon">🎯</span>
                <span>高效的内容运营工具</span>
            </div>
            <div class="feature">
                <span class="feat-icon">🔒</span>
                <span>安全可靠的权限管理</span>
            </div>
        </div>
    </div>
    <!-- Right Form -->
    <div class="login-right">
        <div class="logo-sm">G</div>
        <div class="form-title">欢迎回来</div>
        <div class="form-sub">请登录您的管理后台</div>
        <div class="form-group">
            <label>用户名 / 邮箱</label>
            <div class="input-wrap">
                <span class="pre-icon">👤</span>
                <input type="text" id="username" placeholder="请输入用户名或邮箱">
            </div>
        </div>
        <div class="form-group">
            <label>密码</label>
            <div class="input-wrap">
                <span class="pre-icon">🔒</span>
                <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter') login()">
            </div>
        </div>
        <div class="form-row">
            <label class="remember"><input type="checkbox" checked> 记住我</label>
            <span class="forgot" onclick="showToast('请联系管理员重置密码')">忘记密码？</span>
        </div>
        <button class="login-submit" onclick="login()">登 录</button>
        <div class="login-divider">其他登录方式</div>
        <div class="other-login">
            <button class="other-btn" onclick="showToast('企业微信登录')">💬 企业微信</button>
            <button class="other-btn" onclick="showToast('飞书登录')">📘 飞书</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
    <script src="js/index.js"></script>

</body>
</html>
